# [bar]
# order = ["main"]              # layer-shell creation order

[bar.main]
position           = "top"       # top | bottom | left | right
enabled            = true
auto_hide          = false       # slide out after pointer leaves; reveal from edge trigger strip
show_on_workspace_switch = true  # with auto_hide: briefly reveal when the active workspace changes
reserve_space      = true        # reserve compositor exclusive zone / push windows away
layer              = "top"       # top | overlay; overlay appears above fullscreen apps

thickness          = 38          # bar cross-axis size in pixels (height for horizontal, width for vertical)
background_opacity = 0.4         # 0.0 (transparent) to 1.0 (opaque)
border             = "outline"   # color role or #RRGGBB for the bar outline
border_width       = 0.0         # inside outline width in pixels; 0 disables it
shadow             = true        # cast the global [shell.shadow]
contact_shadow     = false       # dark gradient between an attached panel and the bar (depth at the seam)
panel_overlap      = 1           # logical px an attached panel overlaps the bar edge to hide the seam
radius             = 16          # global corner radius fallback
radius_top_left    = 16
radius_top_right   = 16
radius_bottom_left = 16
radius_bottom_right = 16
concave_edge_corners = false     # carve the screen-edge corners inward; requires margin_edge = 0
margin_ends        = 16          # inset from each end of the bar along its main axis
margin_edge        = 8           # distance from the nearest screen edge (positive values float the bar)
margin_opposite_edge = 4         # extra reserved space on the inward side of the bar (below for top, above for bottom)
padding            = 8           # main-axis padding from bar edges to start/end widget sections
widget_spacing     = 6           # gap between widgets within a section
hover_highlight    = true        # softly tint the widget under the mouse pointer with its foreground color
scale              = 1.0         # content scale multiplier for icons and text
font_weight        = "bold"      # "regular" | "bold" - primary label weight for bar widgets
font_family        = "JetBrainsMono Nerd Font"  # typeface for this bar's widgets; empty inherits the global font

# Default capsule style for all widgets on this bar (see Widget Capsule section)
capsule            = true
capsule_fill       = "surface"
capsule_thickness  = 0.8         # capsule size across the bar as a fraction of bar thickness (1.0 fills the bar)
capsule_radius     = 12.0        # omit for automatic pill radius
capsule_opacity    = 0.35
# capsule_border   = "outline"   # omit this key for no border by default

start  = ["control-center","spacer","media"]
center = ["clock"]
end    = ["tray", "clipboard","spacer", "network", "spacer","ram","spacer","bluetooth","spacer", "volume", "spacer","brightness", "spacer","battery","spacer", "notifications"]
