# More option see https://github.com/DreamMaoMao/mango/wiki/

exec-once = noctalia
#exec-once = foot

env = GDK_BACKEND,wayland,x11,*
env = QT_QPA_PLATFORM,wayland;x11
env=QT_WAYLAND_SCREEN_SCALE_FACTOR,1
env=QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env=QT_QPA_PLATFORMTHEME,qt6ct

# Window efect
blur=0
blur_layer=0
blur_optimized=1
blur_params_num_passes = 2
blur_params_radius = 5
blur_params_noise = 0.02
blur_params_brightness = 0.9
blur_params_contrast = 0.9
blur_params_saturation = 1.2

shadows=0
layer_shadows = 0
shadow_only_floating = 1
shadows_size = 10
shadows_blur = 15
shadows_position_x = 0
shadows_position_y = 0
shadowscolor= 0x000000ff

border_radius=6
no_radius_when_single=0
focused_opacity=1.0
unfocused_opacity=1.0

# Animation Configuration(support type:zoom,slide)
# tag_animation_direction: 1-horizontal,0-vertical
animations=1
layer_animations=1
animation_type_open=slide
animation_type_close=slide
animation_fade_in=1
animation_fade_out=1
tag_animation_direction=1
zoom_initial_ratio=0.4
zoom_end_ratio=0.8
fadein_begin_opacity=0.5
fadeout_begin_opacity=0.8
animation_duration_move=500
animation_duration_open=400
animation_duration_tag=350
animation_duration_close=800
animation_duration_focus=0
animation_curve_open=0.46,1.0,0.29,1
animation_curve_move=0.46,1.0,0.29,1
animation_curve_tag=0.46,1.0,0.29,1
animation_curve_close=0.08,0.92,0,1
animation_curve_focus=0.46,1.0,0.29,1
animation_curve_opafadeout=0.5,0.5,0.5,0.5
animation_curve_opafadein=0.46,1.0,0.29,1

# Scroller Layout Setting
scroller_structs=20
scroller_default_proportion=0.8
scroller_focus_center=0
scroller_prefer_center=0
edge_scroller_pointer_focus=1
edge_scroller_focus_allow_speed=0.0
scroller_default_proportion_single=1.0
scroller_proportion_preset=0.5,0.8,1.0

# Master-Stack Layout Setting
new_is_master=0
default_mfact=0.60
default_nmaster=1
smartgaps=0

# Dwindle Layout Setting
dwindle_smart_split=0
dwindle_drop_simple_split=1
dwindle_manual_split=0
dwindle_hsplit=1
dwindle_vsplit=1
dwindle_preserve_split=0

# overview Setting
hotarea_size=10
enable_hotarea=1
ov_tab_mode=0
ov_no_resize=1
overviewgappi=5
overviewgappo=30

# Misc
no_border_when_single=0
axis_bind_apply_timeout=100
focus_on_activate=1
idleinhibit_ignore_visible=0
sloppyfocus=1
warpcursor=1
focus_cross_monitor=0
focus_cross_tag=0
enable_floating_snap=0
snap_distance=30
#cursor_size=24
drag_tile_to_tile=1
drag_tile_small=1
cursor_hide_on_keypress=1
cursor_hide_timeout=40

# keyboard
repeat_rate=35
repeat_delay=250
numlockon=0
xkb_rules_layout=us

# Trackpad
# need relogin to make it apply
disable_trackpad=0
tap_to_click=1
tap_and_drag=1
drag_lock=1
trackpad_natural_scrolling=0
disable_while_typing=1
left_handed=0
middle_button_emulation=0
swipe_min_threshold=1
send_events_mode=2

# mouse
# need relogin to make it apply
mouse_natural_scrolling=0

# Appearance
gappih=4
gappiv=4
gappoh=10
gappov=10
scratchpad_width_ratio=0.8
scratchpad_height_ratio=0.9
borderpx=0
#rootcolor=0x201b14ff
#bordercolor=0x444444ff
#dropcolor=0x8FBA7C55
#splitcolor=0xEB441EFF
#focuscolor=0xc9b890ff
#maximizescreencolor=0x89aa61ff
#urgentcolor=0xad401fff
#scratchpadcolor=0x516c93ff
#globalcolor=0xb153a7ff
#overlaycolor=0x14a57cff

# layout support:
# tile,scroller,grid,deck,monocle,center_tile,vertical_tile,vertical_scroller
tagrule=id:1,layout_name:tile
tagrule=id:2,layout_name:tile
tagrule=id:3,layout_name:tile
tagrule=id:4,layout_name:tile
tagrule=id:5,layout_name:tile
tagrule=id:6,layout_name:tile
tagrule=id:7,layout_name:tile
tagrule=id:8,layout_name:tile
tagrule=id:9,layout_name:tile

# Key Bindings
# key name refer to `xev` or `wev` command output,
# mod keys name: super,ctrl,alt,shift,none

# reload config
bind=SUPER,r,reload_config

# menu and terminal
bind=Alt,space,spawn,noctalia msg panel-toggle launcher
bind=Alt,Return,spawn,foot
bind = Alt,b,spawn, brave-origin
bind = NONE,Print,spawn,noctalia msg screenshot-region
bind = Ctrl,Print,spawn,noctalia msg screenshot-fullscreen

# exit
bind=Alt+Shift,c,spawn,noctalia msg session lock
bind=ALT,c,killclient,
bind =Alt,p,spawn_shell,killall helium brave 2>dev/null;systemctl poweroff

bind=NONE,XF86AudioRaiseVolume,spawn,noctalia msg volume-up
bind=NONE,XF86AudioLowerVolume,spawn,noctalia msg volume-down
bind=NONE,XF86AudioMute,spawn,noctalia msg volume-mute
bind=NONE,XF86MonBrightnessUp,spawn,noctalia msg brightness-up
bind=NONE,XF86MonBrightnessDown,spawn,noctalia msg brightness-down

bind = NONE,XF86AudioPlay,spawn,playerctl play-pause
bind = NONE,XF86AudioPause,spawn,playerctl play-pause
bind = NONE,XF86AudioNext,spawn,playerctl next
bind = NONE,XF86AudioPrev,spawn,playerctl prev

# switch window focus
bind=Alt,Tab,focusstack,next
bind=ALT,h,focusdir,left
bind=ALT,l,focusdir,right
bind=ALT,k,focusdir,up
bind=ALT,j,focusdir,down

# swap window
bind = ALT,r,setkeymode,swap

# switch window status
bind=ALT,f,togglefloating,
bind=ALT+SHIFT,f,togglefullscreen,
bind=ALT,i,minimized,
bind=ALT+SHIFT,I,restore_minimized
bind=ALT,z,toggle_scratchpad

#bind=SUPER,g,toggleglobal,
#bind=ALT,Tab,togglejump,
#bind=ALT,a,togglemaximizescreen,
#bind=ALT+SHIFT,f,togglefakefullscreen,
bind=Alt,o,toggleoverview

# scroller layout
#bind=ALT,e,set_proportion,1.0
#bind=ALT,x,switch_proportion_preset,
#bind=alt+super+ctrl,Left,scroller_stack,left
#bind=alt+super+ctrl,Right,scroller_stack,right
#bind=alt+super+ctrl,Up,scroller_stack,up
#bind=alt+super+ctrl,Down,scroller_stack,down

#dwindle layout(manual split mode)
#bind=alt+shift,Return,dwindle_toggle_split_direction

# switch layout
bind=ALT,t,setlayout,tile
bind=ALT,s,setlayout,scroller
bind=ALT,m,setlayout,fair
bind=ALT,v,setlayout,center_tile

# tag switch
#bind=SUPER,Left,viewtoleft,0
#bind=CTRL,Left,viewtoleft_have_client,0
#bind=SUPER,Right,viewtoright,0
#bind=CTRL,Right,viewtoright_have_client,0
#bind=CTRL+SUPER,Left,tagtoleft,0
#bind=CTRL+SUPER,Right,tagtoright,0

bind=ALT,1,view,1,0
bind=ALT,2,view,2,0
bind=ALT,3,view,3,0
bind=ALT,4,view,4,0
bind=ALT,5,view,5,0
bind=ALT,6,view,6,0
bind=ALT,7,view,7,0
bind=ALT,8,view,8,0
bind=ALT,9,view,9,0

# tag: move client to the tag and focus it
# tagsilent: move client to the tag and not focus it
# bind=Alt,1,tagsilent,1
bind=Alt+SHIFT,1,tag,1,0
bind=Alt+SHIFT,2,tag,2,0
bind=Alt+SHIFT,3,tag,3,0
bind=Alt+SHIFT,4,tag,4,0
bind=Alt+SHIFT,5,tag,5,0
bind=Alt+SHIFT,6,tag,6,0
bind=Alt+SHIFT,7,tag,7,0
bind=Alt+SHIFT,8,tag,8,0
bind=Alt+SHIFT,9,tag,9,0

# monitor switch
#bind=alt+shift,Left,focusmon,left
#bind=alt+shift,Right,focusmon,right
#bind=SUPER+Alt,Left,tagmon,left
#bind=SUPER+Alt,Right,tagmon,right

# gaps
#bind=ALT+SHIFT,X,incgaps,1
#bind=ALT+SHIFT,Z,incgaps,-1
#bind=ALT+SHIFT,R,togglegaps

# movewin
#bind=CTRL+SHIFT,d,movewin,+0,-50
#bind=CTRL+SHIFT,f,movewin,+0,+50
#bind=CTRL+SHIFT,s,movewin,-50,+0
#bind=CTRL+SHIFT,a,movewin,+50,+0

# resizewin
bind=ALT,r,setkeymode,resize
keymode=resize
bind=NONE,k,resizewin,+0,-50
bind=NONE,j,resizewin,+0,+50
bind=NONE,h,resizewin,-50,+0
bind=NONE,l,resizewin,+50,+0
bind=NONE,Escape,setkeymode, default


keymode = swap
bind=NONE,k,exchange_client,up
bind=NONE,j,exchange_client,down
bind=NONE,h,exchange_client,left
bind=NONE,l,exchange_client,right
bind = NONE,Escape,setkeymode,default

# Mouse Button Bindings
# btn_left and btn_right can't bind none mod key
mousebind=SUPER,btn_left,moveresize,curmove
mousebind=NONE,btn_middle,togglemaximizescreen,0
mousebind=SUPER,btn_right,moveresize,curresize


# Axis Bindings
axisbind=SUPER,UP,viewtoleft_have_client
axisbind=SUPER,DOWN,viewtoright_have_client

windowrule=isfloating:1,isglobal:1,width:0.25,height:0.25,offsetx:95,offsety:92,title:Picture-in-picture
#windowrule=isnamedscratchpad:1,isfloating:1,title:YouTube Music

source=~/.config/mango/noctalia.conf
